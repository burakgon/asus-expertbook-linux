# v4l2loopback config: a single virtual device that lies in the V4L2 layer
# saying "I am one camera with one streaming consumer at a time" — required
# by Chrome / Firefox / Zoom which won't open a device that says "I might
# be muxed to multiple consumers".
#
# COEXISTENCE WARNING: this is a GLOBAL options line. modprobe concatenates
# every `options v4l2loopback` line system-wide, and `devices=1` spawns
# only ONE node — so if another tool ships its own line (e.g. linuxdrop on
# video_nr=20), they collide and one device never appears. If you run
# another v4l2loopback consumer, DELETE this line and use one shared
# multi-device config instead, e.g.:
#   options v4l2loopback devices=2 video_nr=10,20 \
#     card_label="AI Camera","LinuxDrop Camera" exclusive_caps=1,1
# See README.md → "v4l2loopback coexistence".
options v4l2loopback devices=1 video_nr=10 card_label="AI Camera" exclusive_caps=1
