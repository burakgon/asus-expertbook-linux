# Disable PSR / Panel Replay on the xe driver.
#
# The Panther Lake iGPU's xe driver hangs the eDP-1 display engine when the
# panel uses Panel Replay Selective Update (Early Transport): the kernel
# logs "Timed out waiting PSR idle state" and "[CRTC:151:pipe A] DSB 0
# timed out waiting for idle", KWin spams "Pageflip timed out! This is a
# bug in the xe kernel driver", and the internal panel goes black.
#
# No dedicated upstream tracker exists for this PTL PSR2 selective-fetch /
# DSB hang; it is reproduced locally on linux-cachyos 7.0.11 and
# linux-cachyos-rc 7.1-rc7. (drm/xe #7513 is a related but DISTINCT Lunar
# Lake PMC-firmware shutdown bug, NOT this one.) Until xe ships a fix,
# force PSR off entirely. Cost: ~1 W of extra panel power on idle. No
# visible side-effects.
options xe enable_psr=0 enable_psr2_sel_fetch=0 enable_panel_replay=0
