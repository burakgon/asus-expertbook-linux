# asus-expertbook-linux display-hdr-fix mkinitcpio drop-in.
#
# The xe driver loads in initramfs (via the `kms` hook) and probes the
# eDP-1 connector before the root filesystem is mounted. When
# drm.edid_firmware= points at /usr/lib/firmware/edid/asus-b9406-edid.bin,
# the firmware loader can't find the file because /usr/ isn't reachable
# yet. Result: dmesg shows
#
#   xe 0000:00:02.0: Direct firmware load for edid/asus-b9406-edid.bin
#                    failed with error -2
#
# and the EDID override silently no-ops. Bake the file into the initramfs
# itself so it's available during early KMS.

FILES+=(/usr/lib/firmware/edid/asus-b9406-edid.bin)
