# Intel BE211 (8086:e440) Wi-Fi 7 / 802.11be (EHT) is unstable under
# iwlwifi/iwlmld: EHT RX collapses to MCS0/NSS1 and MLO sessions tear down.
# Disabling EHT falls back to 802.11ax (Wi-Fi 6 / HE), which is rock-solid at
# full speed. Remove this when Intel fixes the iwlwifi EHT path upstream.
options iwlwifi disable_11be=Y
