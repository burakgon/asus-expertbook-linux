# ASUS ExpertBook Ultra (B9406CAA) — Intel Wi-Fi 7 BE211 (iwlmld op_mode)
# power_scheme: 1 = active (no power saving), 2 = balanced (default), 3 = low
# Default 2 produces "missed beacons exceeds threshold" spam on this card
# under marginal signal conditions; pinning to 1 keeps the radio constantly
# awake and dramatically reduces beacon-loss disconnects.
options iwlmld power_scheme=1
