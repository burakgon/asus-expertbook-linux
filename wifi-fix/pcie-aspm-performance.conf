# systemd-tmpfiles drop-in: pin global PCIe ASPM policy to "performance"
# at every boot. This disables L0s / L1 / L1.x sub-states for the wireless
# card (CNVi integrated endpoint, where per-device knobs in
# /sys/bus/pci/devices/.../link/ don't exist), which removes the L1.x
# wake latency that causes "missed beacons exceeds threshold" on the
# Intel Wi-Fi 7 BE211.
#
# Side-effect: also disables ASPM for every other PCIe device on the
# system, so idle power draw goes up by ~1-3 W on this laptop.
# Acceptable trade-off if you want stable Wi-Fi 7 over reliable suspend.
# Revert by uninstalling this module.

w- /sys/module/pcie_aspm/parameters/policy - - - - performance
