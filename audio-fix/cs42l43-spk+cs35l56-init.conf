# cs42l43-spk+cs35l56 combined codec init.
#
# Used by ASUS ExpertBook Ultra (B9406CAA) and other laptops whose SOF
# topology declares "spk:cs42l43-spk+cs35l56" in alsa.components. Without
# this file UCM falls back to an unrouted stereo-fallback profile and
# nothing reaches the speaker amps via PipeWire, even though direct ALSA
# playback to the Speaker PCM works.
#
# Combines the actions of the shipped cs42l43 + cs35l56 codec inits:
#   - Map the abstract "cs42l43 Speaker Playback Switch" / "cs35l56 Speaker
#     Playback Switch" controls to the concrete kernel controls.
#   - Attach the platform "speaker" LED to the AMPx mute switches so the F1
#     mute LED follows the real ALSA state.
#   - Set initial speaker digital volume.
#
# NOTE: HiFi.conf is responsible for un-muting the AMPx switches at runtime
# via its sequence; we deliberately do not include cs35l56's mute-at-boot
# FixedBootSequence here because, on this platform, no HiFi profile gets
# selected today, and muting at boot would also silence direct ALSA users.

LibraryConfig.remap.Config {
	ctl.default.map {
		"name='cs42l43 Speaker Playback Switch'" {
			"name='cs42l43 Speaker Digital Switch'".vindex.0 0
			"name='cs42l43 Speaker Digital Switch'".vindex.1 1
		}
		"name='cs35l56 Speaker Playback Switch'" {
			"name='AMP1 Speaker Switch'".vindex.0 0
			"name='AMP2 Speaker Switch'".vindex.0 0
		}
	}
}

If.cs42l43_spk_default_vol {
	Condition {
		Type String
		Empty "${var:-@OutMix>0dB}"
	}
	True.BootSequence [
		cset "name='cs42l43 Speaker Digital Volume' 128"
	]
}

Macro [
	{ SetLED { LED="speaker" Action="attach" CtlId="AMP1 Speaker Switch" } }
	{ SetLED { LED="speaker" Action="attach" CtlId="AMP2 Speaker Switch" } }
]
