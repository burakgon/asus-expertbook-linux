# Disable the unused SOF Bluetooth SCO hardware-offload PCM (sof_sdw card,
# device 20, id "Bluetooth"). The generic SOF topology declares an SSP2-BT
# offload route, but this firmware has no matching blob, so every time
# WirePlumber probes that PCM the kernel logs:
#   sof-audio ... no matching blob for sample rate 48000 width 16 channels 2
#   ... failed to prepare widget dai-copier.SSP.SSP2-BT.capture
#   Bluetooth: ASoC error (-22)
# ~120 lines (~40% of all kernel errors) at every boot. Bluetooth audio
# (A2DP music + HFP calls) works over the normal PipeWire software path;
# this hardware-offload PCM is unused. Disabling the node stops the probe.
monitor.alsa.rules = [
  {
    matches = [
      { api.alsa.pcm.id = "Bluetooth" }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
]
