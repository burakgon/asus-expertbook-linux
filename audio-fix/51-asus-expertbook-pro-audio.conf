# ASUS ExpertBook Ultra (B9406CAA) — sound device routing & UI cleanup.
#
# 1. Pin the SOF SoundWire card to the Pro Audio profile so PipeWire exposes
#    a discrete Speaker sink (pro-output-2). Without this, WirePlumber picks
#    "stereo-fallback" which never reaches the cs35l56 amps.
#
# 2. Pro Audio is a passthrough profile that exposes ALL eight ALSA PCMs as
#    independent sinks. Several of those are noise in normal sound panels
#    (Bluetooth — handled by the bluez stack instead, and the two Deepbuffer
#    PCMs which alias the regular Jack/Speaker with bigger ring buffers).
#    Hide them.
#
# 3. The remaining real outputs get human-readable names so a user picking a
#    default sink doesn't see "pro-output-N" in the UI.

monitor.alsa.rules = [
  # 1) profile pin
  {
    matches = [
      { device.name = "alsa_card.pci-0000_00_1f.3-platform-sof_sdw" }
    ]
    actions = {
      update-props = {
        device.profile = "pro-audio"
      }
    }
  }

  # 2) hide pro-output-20 (Bluetooth), -31 (Deepbuffer Jack), -35 (Deepbuffer Speaker)
  {
    matches = [
      { node.name = "~alsa_output\\.pci-0000_00_1f\\.3-platform-sof_sdw\\.pro-output-(20|31|35)" }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
  {
    matches = [
      { node.name = "~alsa_input\\.pci-0000_00_1f\\.3-platform-sof_sdw\\.pro-input-(20|31|35)" }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }

  # 3) friendly descriptions for the remaining sinks
  {
    matches = [{ node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.pro-output-0" }]
    actions = { update-props = { node.description = "Headphone Jack" } }
  }
  {
    matches = [{ node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.pro-output-2" }]
    actions = { update-props = { node.description = "Speaker (Internal)" } }
  }
  {
    matches = [{ node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.pro-output-5" }]
    actions = { update-props = { node.description = "HDMI 1" } }
  }
  {
    matches = [{ node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.pro-output-6" }]
    actions = { update-props = { node.description = "HDMI 2" } }
  }
  {
    matches = [{ node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.pro-output-7" }]
    actions = { update-props = { node.description = "HDMI 3" } }
  }

  # 4) friendly descriptions for capture sources
  {
    matches = [{ node.name = "alsa_input.pci-0000_00_1f.3-platform-sof_sdw.pro-input-1" }]
    actions = { update-props = { node.description = "Headset Mic (3.5mm Jack)" } }
  }
  {
    matches = [{ node.name = "alsa_input.pci-0000_00_1f.3-platform-sof_sdw.pro-input-4" }]
    actions = { update-props = { node.description = "Internal Microphone" } }
  }

  # 5) keep the Speaker sink awake.
  #
  # WirePlumber's default session.suspend-timeout-seconds=5 lets the sink
  # idle into D3hot. On this cs35l56 + Pro Audio combo, the very first
  # samples after wake-up arrive before the speaker amp's DSP has finished
  # re-engaging, audible as a brief crunch/static on the first second of
  # playback. (Touching the volume control kicks it back into shape because
  # the property update wakes the sink without playing samples.) Setting
  # the timeout to 0 disables idle-suspend for the Speaker sink only —
  # everything else (HDMI, headphones, the mics) keeps default behaviour.
  {
    matches = [
      { node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.pro-output-2" }
    ]
    actions = {
      update-props = {
        session.suspend-timeout-seconds = 0
      }
    }
  }
]
